<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ========== 全局状态 ==========
let selectedRegion = null;
let scene, camera, renderer, controls, brainGroup;
const markers = [];
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredMarker = null;

// ========== 初始化 Three.js ==========
function initThree() {
  const container = document.getElementById('three-container');
  const { width, height } = container.getBoundingClientRect();

  scene = new THREE.Scene();

  // 渐变背景
  const bgColor = new THREE.Color('#1e1e2e');
  scene.background = bgColor;
  scene.fog = new THREE.Fog('#1e1e2e', 5, 30);

  camera = new THREE.PerspectiveCamera(50, width / height, 0.5, 50);
  camera.position.set(12, 4, 14);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(width, height);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  container.appendChild(renderer.domElement);

  // 轨道控制
  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 6;
  controls.maxDistance = 25;
  controls.maxPolarAngle = Math.PI * 0.8;
  controls.target.set(0, 0, -2);
  controls.update();

  // 光照
  const ambientLight = new THREE.AmbientLight('#404060', 1.8);
  scene.add(ambientLight);

  const keyLight = new THREE.DirectionalLight('#ffffff', 4);
  keyLight.position.set(8, 12, 8);
  keyLight.castShadow = true;
  keyLight.shadow.mapSize.set(1024, 1024);
  keyLight.shadow.camera.near = 0.5;
  keyLight.shadow.camera.far = 50;
  scene.add(keyLight);

  const fillLight = new THREE.DirectionalLight('#8899cc', 1.5);
  fillLight.position.set(-4, 2, -4);
  scene.add(fillLight);

  const rimLight = new THREE.DirectionalLight('#ffffff', 1);
  rimLight.position.set(0, -2, 8);
  scene.add(rimLight);

  // 构建大脑
  buildBrain();

  // 事件
  renderer.domElement.addEventListener('click', onCanvasClick);
  renderer.domElement.addEventListener('mousemove', onCanvasMouseMove);
  window.addEventListener('resize', onResize);

  // 隐藏提示
  setTimeout(() => {
    const hint = document.getElementById('viewerHint');
    if (hint) hint.classList.add('fading');
  }, 8000);

  animate();
}

// ========== 生成大脑皮层纹理 ==========
function createBrainTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 1024;
  canvas.height = 512;
  const ctx = canvas.getContext('2d');

  // 基底色
  ctx.fillStyle = '#c4a89c';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 绘制脑沟 (sulci) - 深色蜿蜒线条
  function drawSulcus(x1, y1, x2, y2, width) {
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    // 蜿蜒路径
    const midX = (x1 + x2) / 2 + (Math.random() - 0.5) * 80;
    const midY = (y1 + y2) / 2 + (Math.random() - 0.5) * 60;
    ctx.quadraticCurveTo(midX, midY, x2, y2);
    ctx.strokeStyle = '#8b6f5e';
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.stroke();

    // 高亮边缘
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.quadraticCurveTo(midX + 2, midY + 2, x2 + 2, y2 + 2);
    ctx.strokeStyle = '#d4c0b0';
    ctx.lineWidth = width * 0.4;
    ctx.stroke();
  }

  // 绘制多条脑沟
  for (let i = 0; i < 80; i++) {
    const x1 = Math.random() * canvas.width;
    const y1 = Math.random() * canvas.height;
    const len = 60 + Math.random() * 200;
    const angle = Math.random() * Math.PI * 2;
    const x2 = x1 + Math.cos(angle) * len;
    const y2 = y1 + Math.sin(angle) * len;
    drawSulcus(x1, y1, Math.min(canvas.width, Math.max(0, x2)), Math.min(canvas.height, Math.max(0, y2)), 2 + Math.random() * 8);
  }

  // 添加中央沟标记 (水平中线附近)
  ctx.strokeStyle = '#7a5f50';
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(canvas.width * 0.2, canvas.height * 0.35);
  ctx.quadraticCurveTo(canvas.width * 0.5, canvas.height * 0.55, canvas.width * 0.8, canvas.height * 0.4);
  ctx.stroke();
  // 高亮
  ctx.strokeStyle = '#c8b4a4';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(canvas.width * 0.2 + 1, canvas.height * 0.35 + 1);
  ctx.quadraticCurveTo(canvas.width * 0.5 + 1, canvas.height * 0.55 + 1, canvas.width * 0.8 + 1, canvas.height * 0.4 + 1);
  ctx.stroke();

  return new THREE.CanvasTexture(canvas);
}

// ========== 构建 3D 大脑 ==========
function buildBrain() {
  brainGroup = new THREE.Group();
  scene.add(brainGroup);

  const brainTexture = createBrainTexture();
  brainTexture.wrapS = THREE.RepeatWrapping;
  brainTexture.wrapU = THREE.RepeatWrapping;

  const cortexMat = new THREE.MeshStandardMaterial({
    map: brainTexture,
    color: '#d4b8a8',
    roughness: 0.5,
    metalness: 0.03
  });

  const innerMat = new THREE.MeshStandardMaterial({
    color: '#f0e0d0',
    roughness: 0.3,
    metalness: 0.02
  });

  // --- 大脑皮层 (两个半球, 用多个变形的球体创造更真实的形状) ---

  // 每个半球用 3 个重叠的椭球体构建 (额叶、顶叶、枕叶/颞叶)
  function createHemisphere(side) {
    const sx = side > 0 ? 1 : -1;
    const group = new THREE.Group();

    // 主球体 (额叶+顶叶)
    const mainGeo = new THREE.SphereGeometry(2.6, 64, 48);
    const main = new THREE.Mesh(mainGeo, cortexMat);
    main.scale.set(0.85, 1.05, 0.9);
    main.position.set(sx * 0.9, 0.5, -0.3);
    main.castShadow = true;
    main.receiveShadow = true;
    group.add(main);

    // 枕叶 (后部突出)
    const occGeo = new THREE.SphereGeometry(1.8, 48, 32);
    const occipital = new THREE.Mesh(occGeo, cortexMat);
    occipital.scale.set(0.7, 0.8, 0.9);
    occipital.position.set(sx * 0.6, -0.1, -1.8);
    occipital.castShadow = true;
    group.add(occipital);

    // 颞叶 (下部突出)
    const tempGeo = new THREE.SphereGeometry(1.6, 48, 32);
    const temporal = new THREE.Mesh(tempGeo, cortexMat);
    temporal.scale.set(0.8, 0.6, 0.7);
    temporal.position.set(sx * 1.3, -1.0, -0.5);
    temporal.castShadow = true;
    group.add(temporal);

    // 额极 (前部)
    const frontGeo = new THREE.SphereGeometry(1.9, 48, 32);
    const frontal = new THREE.Mesh(frontGeo, cortexMat);
    frontal.scale.set(0.75, 0.9, 0.8);
    frontal.position.set(sx * 0.8, 1.3, 1.0);
    frontal.castShadow = true;
    group.add(frontal);

    return group;
  }

  const leftHemi = createHemisphere(-1);
  const rightHemi = createHemisphere(1);
  brainGroup.add(leftHemi);
  brainGroup.add(rightHemi);

  // 半球间裂 (胼胝体上方的缝)
  const fissureGeo = new THREE.BoxGeometry(0.15, 3.8, 3.0);
  const fissure = new THREE.Mesh(fissureGeo, new THREE.MeshStandardMaterial({
    color: '#3a2a20', roughness: 0.8, metalness: 0
  }));
  fissure.position.set(0, 0.3, -0.1);
  brainGroup.add(fissure);

  // --- 小脑 ---
  function createCerebellum() {
    const cbGroup = new THREE.Group();

    // 小脑蚓部 (中央)
    const vermisGeo = new THREE.CylinderGeometry(0.35, 0.35, 1.6, 16);
    const vermis = new THREE.Mesh(vermisGeo, cortexMat);
    vermis.position.set(0, -2.2, -1.8);
    vermis.rotation.x = 0.6;
    vermis.castShadow = true;
    cbGroup.add(vermis);

    // 小脑半球 (两个旁叶)
    for (let s = -1; s <= 1; s += 2) {
      const hemiGeo = new THREE.SphereGeometry(1.15, 32, 24);
      const cbHemi = new THREE.Mesh(hemiGeo, cortexMat);
      cbHemi.scale.set(1.2, 0.55, 0.45);
      cbHemi.position.set(s * 0.55, -2.15, -2.1);
      cbHemi.rotation.z = s * 0.25;
      cbHemi.castShadow = true;
      cbGroup.add(cbHemi);

      // 小脑叶片纹理 (平行环形线)
      for (let i = 0; i < 6; i++) {
        const ringGeo = new THREE.TorusGeometry(0.7 + i * 0.12, 0.025, 6, 24);
        const ring = new THREE.Mesh(ringGeo, new THREE.MeshStandardMaterial({
          color: '#8b6a55', roughness: 0.6, metalness: 0.02
        }));
        ring.position.set(s * 0.55, -2.15, -2.1 + i * 0.06);
        ring.rotation.x = Math.PI / 2;
        ring.rotation.y = s * 0.35;
        ring.scale.set(1, 0.5, 1);
        cbGroup.add(ring);
      }
    }

    return cbGroup;
  }
  brainGroup.add(createCerebellum());

  // --- 脑干 ---
  function createBrainstem() {
    const bsGroup = new THREE.Group();

    // 中脑
    const midbrainGeo = new THREE.SphereGeometry(0.55, 16, 12);
    const midbrain = new THREE.Mesh(midbrainGeo, cortexMat);
    midbrain.scale.set(0.9, 0.7, 0.8);
    midbrain.position.set(0, -1.5, -0.5);
    midbrain.castShadow = true;
    bsGroup.add(midbrain);

    // 脑桥
    const ponsGeo = new THREE.CylinderGeometry(0.5, 0.55, 0.8, 16);
    const pons = new THREE.Mesh(ponsGeo, cortexMat);
    pons.position.set(0, -2.1, -0.6);
    pons.castShadow = true;
    bsGroup.add(pons);

    // 延髓
    const medullaGeo = new THREE.CylinderGeometry(0.3, 0.48, 1.2, 16);
    const medulla = new THREE.Mesh(medullaGeo, cortexMat);
    medulla.position.set(0, -2.9, -0.5);
    medulla.castShadow = true;
    bsGroup.add(medulla);

    return bsGroup;
  }
  brainGroup.add(createBrainstem());

  // --- 胼胝体 (连接两半球的弧形白色纤维) ---
  const ccCurve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(0, 2.0, 1.0),
    new THREE.Vector3(0, 2.2, 0.3),
    new THREE.Vector3(0, 1.8, -0.5),
    new THREE.Vector3(0, 1.3, -1.2)
  ]);
  const ccTubeGeo = new THREE.TubeGeometry(ccCurve, 20, 0.25, 8, false);
  const ccMatWhite = new THREE.MeshStandardMaterial({ color: '#f0e8d8', roughness: 0.25, metalness: 0.04 });
  const cc = new THREE.Mesh(ccTubeGeo, ccMatWhite);
  brainGroup.add(cc);

  // --- 脑区标记球体 ---
  brainRegions.forEach(region => {
    const [rx, ry, rz] = region.position3D;
    // 将 MNI 坐标 (mm) 映射到场景坐标 (缩小)
    const sx = rx / 28;
    const sy = (ry + 30) / 28;
    const sz = (rz - 10) / 25;

    // 标记球体
    const markerGeo = new THREE.SphereGeometry(0.2, 20, 20);
    const markerMat = new THREE.MeshStandardMaterial({
      color: region.color,
      roughness: 0.3,
      metalness: 0.2,
      emissive: region.color,
      emissiveIntensity: 0.4
    });
    const marker = new THREE.Mesh(markerGeo, markerMat);
    marker.position.set(sx, sy, sz);
    marker.userData = { region, isMarker: true, baseScale: 1 };
    marker.castShadow = true;
    brainGroup.add(marker);
    markers.push(marker);

    // 外环
    const ringGeo = new THREE.TorusGeometry(0.28, 0.04, 8, 16);
    const ringMat = new THREE.MeshStandardMaterial({
      color: region.color,
      roughness: 0.2,
      metalness: 0.3,
      emissive: region.color,
      emissiveIntensity: 0.3
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.copy(marker.position);
    ring.userData = { region, isRing: true, parentMarker: marker };
    brainGroup.add(ring);
  });

  // 粒子背景
  const particlesGeo = new THREE.BufferGeometry();
  const particleCount = 200;
  const positions = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount; i++) {
    positions[i*3] = (Math.random() - 0.5) * 20;
    positions[i*3+1] = (Math.random() - 0.5) * 20;
    positions[i*3+2] = (Math.random() - 0.5) * 20;
  }
  particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const particlesMat = new THREE.PointsMaterial({
    color: '#556688',
    size: 0.03,
    transparent: true,
    opacity: 0.5
  });
  scene.add(new THREE.Points(particlesGeo, particlesMat));
}

// ========== 交互逻辑 ==========
function onCanvasClick(event) {
  const container = document.getElementById('three-container');
  const rect = container.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(markers, false);

  if (intersects.length > 0) {
    const obj = intersects[0].object;
    if (obj.userData.isMarker && obj.userData.region) {
      selectRegion(obj.userData.region.id);
    }
  }
}

function onCanvasMouseMove(event) {
  const container = document.getElementById('three-container');
  const rect = container.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(markers, false);

  if (intersects.length > 0) {
    const obj = intersects[0].object;
    if (obj.userData.isMarker && obj.userData.region) {
      if (hoveredMarker !== obj) {
        resetMarkerHover();
        hoveredMarker = obj;
        obj.scale.set(1.6, 1.6, 1.6);
        obj.material.emissiveIntensity = 1.0;
        document.body.style.cursor = 'pointer';
      }
      return;
    }
  }
  resetMarkerHover();
  document.body.style.cursor = '';
}

function resetMarkerHover() {
  if (hoveredMarker) {
    hoveredMarker.scale.set(1, 1, 1);
    hoveredMarker.material.emissiveIntensity = 0.4;
    hoveredMarker = null;
  }
}

// ========== 脑区选择 ==========
function selectRegion(regionId) {
  const region = brainRegions.find(r => r.id === regionId);
  if (!region) return;

  selectedRegion = region;

  // 重置所有标记
  markers.forEach(m => {
    m.scale.set(1, 1, 1);
    m.material.emissiveIntensity = 0.4;
  });

  // 高亮选中标记
  const targetMarker = markers.find(m => m.userData.region.id === regionId);
  if (targetMarker) {
    targetMarker.scale.set(1.8, 1.8, 1.8);
    targetMarker.material.emissiveIntensity = 1.5;
  }

  // 更新信息面板
  updateInfoPanel(region);
}

// ========== 信息面板更新 ==========
function updateInfoPanel(region) {
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('regionTitle').textContent = region.name;
  document.getElementById('regionEnglish').textContent = region.nameEn;

  const sysTag = document.getElementById('regionSystemTag');
  sysTag.style.display = 'inline-block';
  sysTag.textContent = region.systemName;
  sysTag.style.background = region.color;

  const layers = region.layers;
  let html = '';

  // 1. 解剖位置
  if (layers.anatomy) {
    html += buildSection('📍', '解剖位置与形态',
      `<p><strong>位置：</strong>${layers.anatomy.location}</p>` +
      `<p><strong>外观：</strong>${layers.anatomy.appearance || ''}</p>` +
      `<p><strong>毗邻关系：</strong>${layers.anatomy.relations || ''}</p>` +
      (layers.anatomy.size ? `<p><strong>体积：</strong>${layers.anatomy.size}</p>` : '')
    );
  }

  // 2. 细胞构筑
  if (layers.cytoarchitecture && layers.cytoarchitecture.subnuclei && layers.cytoarchitecture.subnuclei.length > 0) {
    let cytoHtml = '';
    if (layers.cytoarchitecture.special) {
      cytoHtml += `<p style="margin-bottom:12px;">💡 <em>${layers.cytoarchitecture.special}</em></p>`;
    }
    cytoHtml += '<div class="subnuclei-list">';
    layers.cytoarchitecture.subnuclei.forEach(sub => {
      cytoHtml += `<div class="subnucleus-card">
        <div class="sub-name">${sub.name}</div>
        <div class="sub-desc">${sub.desc}</div>
      </div>`;
    });
    cytoHtml += '</div>';
    if (layers.cytoarchitecture.cellTypes && layers.cytoarchitecture.cellTypes.length > 0) {
      cytoHtml += '<p style="margin-top:8px;"><strong>细胞类型：</strong></p>';
      cytoHtml += '<div class="tag-list">';
      layers.cytoarchitecture.cellTypes.forEach(c => { cytoHtml += `<span class="tag">${c}</span>`; });
      cytoHtml += '</div>';
    }
    if (layers.cytoarchitecture.note) {
      cytoHtml += `<p style="margin-top:8px;font-size:0.83rem;">${layers.cytoarchitecture.note}</p>`;
    }
    html += buildSection('🧬', '细胞构筑与亚核结构', cytoHtml);
  }

  // 3. 主要功能
  if (layers.functions) {
    let funcHtml = `<p><strong>核心功能：</strong>${layers.functions.primary}</p>`;
    if (layers.functions.computational) {
      funcHtml += `<p style="margin-top:8px;"><strong>计算角色：</strong>${layers.functions.computational}</p>`;
    }
    if (layers.functions.paradigms) {
      funcHtml += '<p style="margin-top:8px;"><strong>研究范式：</strong></p><div class="tag-list">';
      layers.functions.paradigms.forEach(p => { funcHtml += `<span class="tag">${p}</span>`; });
      funcHtml += '</div>';
    }
    if (layers.functions.dissociations) {
      funcHtml += `<p style="margin-top:8px;"><strong>功能分离：</strong>${layers.functions.dissociations}</p>`;
    }
    html += buildSection('⚡', '主要功能', funcHtml);
  }

  // 4. 连接组
  if (layers.connectivity) {
    let connHtml = '';
    if (layers.connectivity.inputs) {
      connHtml += '<p><strong>⬇️ 传入 (来自)：</strong></p><div class="tag-list">';
      layers.connectivity.inputs.forEach(i => { connHtml += `<span class="tag">${i}</span>`; });
      connHtml += '</div>';
    }
    if (layers.connectivity.outputs) {
      connHtml += '<p style="margin-top:10px;"><strong>⬆️ 传出 (投射至)：</strong></p><div class="tag-list">';
      layers.connectivity.outputs.forEach(o => { connHtml += `<span class="tag">${o}</span>`; });
      connHtml += '</div>';
    }
    if (layers.connectivity.keyCircuits) {
      connHtml += '<p style="margin-top:10px;"><strong>核心环路：</strong></p><ul style="padding-left:20px;font-size:0.85rem;">';
      layers.connectivity.keyCircuits.forEach(c => { connHtml += `<li>${c}</li>`; });
      connHtml += '</ul>';
    }
    html += buildSection('🔗', '连接组', connHtml);
  }

  // 5. 神经递质
  if (layers.neurotransmitters && layers.neurotransmitters.length > 0) {
    let ntHtml = '<div class="tag-list">';
    layers.neurotransmitters.forEach(nt => { ntHtml += `<span class="tag">${nt}</span>`; });
    ntHtml += '</div>';
    html += buildSection('⚗️', '神经递质系统', ntHtml);
  }

  // 6. 临床关联
  if (layers.clinicalRelevance) {
    let clinHtml = '';
    if (layers.clinicalRelevance.disorders) {
      clinHtml += '<p><strong>相关疾病：</strong></p><div class="tag-list">';
      layers.clinicalRelevance.disorders.forEach(d => { clinHtml += `<span class="tag">${d}</span>`; });
      clinHtml += '</div>';
    }
    if (layers.clinicalRelevance.symptoms) {
      clinHtml += `<p style="margin-top:8px;"><strong>功能障碍表现：</strong>${layers.clinicalRelevance.symptoms}</p>`;
    }
    if (layers.clinicalRelevance.treatments) {
      clinHtml += '<p style="margin-top:8px;"><strong>治疗策略：</strong></p><div class="tag-list">';
      layers.clinicalRelevance.treatments.forEach(t => { clinHtml += `<span class="tag">${t}</span>`; });
      clinHtml += '</div>';
    }
    if (layers.clinicalRelevance.keyNote) {
      clinHtml += `<div class="key-note"><strong>⚠️ 临床要点：</strong>${layers.clinicalRelevance.keyNote}</div>`;
    }
    html += buildSection('🏥', '临床关联', clinHtml);
  }

  // 7. 关键研究
  if (layers.research) {
    let resHtml = '';
    if (layers.research.classicPapers) {
      layers.research.classicPapers.forEach(cp => {
        resHtml += `<div class="citation">
          <span class="cite-author">${cp.author}</span><br>
          <span class="cite-title">"${cp.title}"</span><br>
          <span class="cite-journal">${cp.journal}</span>
        </div>`;

    }
    if (layers.research.recentFindings) {
      resHtml += `<p style="margin-top:10px;"><strong>🔬 最新发现：</strong>${layers.research.recentFindings}</p>`;
    }
    if (layers.research.debates) {
      resHtml += `<p style="margin-top:8px;"><strong>💬 活跃争论：</strong>${layers.research.debates}</p>`;
    }
    html += buildSection('📚', '关键研究', resHtml);
  }

  document.getElementById('infoContent').innerHTML = html;

  // 折叠/展开事件
  document.querySelectorAll('.info-section-header').forEach(header => {
    header.addEventListener('click', () => {
      header.parentElement.classList.toggle('collapsed');
    });
  });
}

function buildSection(icon, title, body) {
  return `<div class="info-section">
    <div class="info-section-header">
      <span class="section-icon">${icon}</span> ${title}
      <span class="section-arrow">▼</span>
    </div>
    <div class="info-section-body">${body}</div>
  </div>`;
}

// ========== 搜索功能 ==========
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
let searchSelectedIndex = -1;

searchInput.addEventListener('input', () => {
  const query = searchInput.value.trim().toLowerCase();
  searchResults.innerHTML = '';
  searchSelectedIndex = -1;

  if (query.length < 1) {
    searchResults.classList.remove('active');
    return;
  }

  const matches = brainRegions.filter(r =>
    r.name.includes(query) ||
    r.nameEn.toLowerCase().includes(query) ||
    r.id.includes(query) ||
    r.systemName.includes(query)
  );

  if (matches.length === 0) {
    searchResults.innerHTML = '<div style="padding:12px;color:var(--text-muted);text-align:center;">未找到匹配脑区</div>';
    searchResults.classList.add('active');
    return;
  }

  matches.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'result-item' + (i === 0 ? ' selected' : '');
    div.innerHTML = `
      <span class="result-dot" style="background:${r.color}"></span>
      <span class="result-name">${r.name}</span>
      <span class="result-en">${r.nameEn.split('(')[0].trim()}</span>
    `;
    div.addEventListener('click', () => {
      selectRegion(r.id);
      searchResults.classList.remove('active');
      searchInput.value = '';
    });
    searchResults.appendChild(div);
  });
  searchResults.classList.add('active');
});

searchInput.addEventListener('keydown', (e) => {
  const items = searchResults.querySelectorAll('.result-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    searchSelectedIndex = Math.min(searchSelectedIndex + 1, items.length - 1);
    updateSearchSelection(items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    searchSelectedIndex = Math.max(searchSelectedIndex - 1, 0);
    updateSearchSelection(items);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (searchSelectedIndex >= 0 && items[searchSelectedIndex]) {
      items[searchSelectedIndex].click();
    }
  } else if (e.key === 'Escape') {
    searchResults.classList.remove('active');
    searchInput.blur();
  }
});

function updateSearchSelection(items) {
  items.forEach((item, i) => {
    item.classList.toggle('selected', i === searchSelectedIndex);
  });
}

// 点击空白关闭搜索
document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-wrapper')) {
    searchResults.classList.remove('active');
  }
});

// ========== SVG 切片绘制 ==========
function drawBrainSlices() {
  const svgNS = 'http://www.w3.org/2000/svg';

  function makeRegionPath(svg, d, color, regionId, opacity) {
    const path = document.createElementNS(svgNS, 'path');
    path.setAttribute('d', d);
    path.setAttribute('fill', color);
    path.setAttribute('fill-opacity', opacity || 0.5);
    path.setAttribute('stroke', color);
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('stroke-opacity', '0.8');
    path.setAttribute('data-region', regionId);
    path.style.cursor = 'pointer';
    path.style.transition = 'fill-opacity 0.2s';
    path.addEventListener('mouseenter', () => { path.setAttribute('fill-opacity', '0.8'); });
    path.addEventListener('mouseleave', () => { path.setAttribute('fill-opacity', opacity || 0.5); });
    path.addEventListener('click', () => {
      if (regionId) selectRegion(regionId);
    });
    svg.appendChild(path);
    return path;
  }

  // 获取脑区颜色
  function color(id) {
    const r = brainRegions.find(r => r.id === id);
    return r ? r.color : '#cccccc';
  }

  // ===== 矢状面 (侧面, 显示中线结构) =====
  const svgSag = document.getElementById('svg-sagittal');
  svgSag.innerHTML = '';

  // 背景轮廓 - 大脑皮层外轮廓
  const cortexOutline = document.createElementNS(svgNS, 'path');
  cortexOutline.setAttribute('d', 'M90,30 Q50,30 30,50 Q15,70 20,100 Q25,150 40,180 Q60,210 100,230 Q140,250 180,250 Q220,250 250,230 Q275,210 280,170 Q285,130 275,90 Q260,50 230,35 Q200,25 160,28 Q130,28 90,30 Z');

  cortexOutline.setAttribute('stroke', '#c4a89c');

  // 各脑区

  makeRegionPath(svgSag, 'M180,120 Q165,140 155,165 Q150,190 160,210 Q175,230 195,235 Q215,235 230,220 Q242,200 240,175 Q238,150 225,130 Q210,118 195,115 Z', color('visual'), 'visual', 0.35);
  makeRegionPath(svgSag, 'M95,80 Q80,95 75,115 Q73,135 80,150 Q95,165 115,170 Q135,172 150,160 Q160,148 162,130 Q160,112 150,100 Q135,85 115,80 Z', color('acc'), 'acc', 0.4);
  makeRegionPath(svgSag, 'M115,190 Q100,210 92,235 Q88,255 95,270 Q110,285 130,288 Q150,288 162,275 Q170,260 168,245 Q163,225 150,210 Q135,195 118,190 Z', color('thalamus'), 'thalamus', 0.5);
  makeRegionPath(svgSag, 'M118,220 Q110,228 108,242 Q110,258 118,265 Q132,270 145,268 Q155,262 158,252 Q156,240 148,230 Q138,222 125,220 Z', color('hypothalamus'), 'hypothalamus', 0.55);

// ========== 视图切换 ==========
window.switchView = function(view) {
  const threeContainer = document.getElementById('three-container');
  const sliceContainer = document.getElementById('slice-container');
  const viewerLabel3d = document.getElementById('viewer3dLabel');
  const viewerHint = document.getElementById('viewerHint');

  document.querySelectorAll('.nav-btn[data-view]').forEach(b => b.classList.remove('active'));
  document.querySelector(`.nav-btn[data-view="${view}"]`)?.classList.add('active');

  if (view === '3d') {
    threeContainer.style.display = 'block';
    sliceContainer.style.display = 'none';
    viewerLabel3d.style.display = 'block';
    viewerHint.style.display = 'block';
    // 触发 Three.js 重绘
    onResize();
  } else if (view === 'slices') {
    threeContainer.style.display = 'none';
    sliceContainer.style.display = 'block';
    viewerLabel3d.style.display = 'none';
    viewerHint.style.display = 'none';
    drawBrainSlices(); // 重新绘制确保数据最新
  }
};

// ========== 自测模式 ==========
window.startQuiz = function() {
  if (brainRegions.length === 0) return;
  const randomRegion = brainRegions[Math.floor(Math.random() * brainRegions.length)];

  // 将 3D 视图旋转到该脑区位置
  const marker = markers.find(m => m.userData.region.id === randomRegion.id);
  if (marker) {
    // 简单动画到该位置
    const targetPos = marker.position.clone();
    controls.target.lerp(targetPos, 0.5);
  }

  // 在面板显示问题
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('regionTitle').textContent = '❓ 自测模式';
  document.getElementById('regionEnglish').textContent = '请点击大脑上对应的标记球体';
  document.getElementById('regionSystemTag').style.display = 'none';

  const quizHtml = `
    <div style="padding:20px;text-align:center;">
      <div style="font-size:1.2rem;font-weight:700;margin-bottom:8px;">
        找到：<span style="color:${randomRegion.color}">${randomRegion.name}</span>
      </div>
      <div style="color:var(--text-muted);margin-bottom:16px;">${randomRegion.nameEn}</div>
      <div class="tag-list" style="justify-content:center;">
        <span class="tag" style="background:${randomRegion.color};color:white;">${randomRegion.systemName}</span>
      </div>
      <button onclick="selectRegion('${randomRegion.id}')" style="
        margin-top:16px;padding:10px 24px;background:var(--text-muted);color:white;
        border:none;border-radius:20px;cursor:pointer;font-size:0.9rem;
      ">显示答案</button>
    </div>
  `;
  document.getElementById('infoContent').innerHTML = quizHtml;
};

// ========== 响应式 ==========
function onResize() {
  const container = document.getElementById('three-container');
  const { width, height } = container.getBoundingClientRect();
  camera.aspect = width / height;
  camera.updateProjectionMatrix();
  renderer.setSize(width, height);
}

// ========== 动画循环 ==========
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  // 标记球体脉动效果
  const time = Date.now() * 0.001;
  markers.forEach(m => {
    if (m !== hoveredMarker && m.userData.region.id !== selectedRegion?.id) {
      const pulse = 1 + Math.sin(time * 2 + m.position.x) * 0.08;
      m.scale.lerp(new THREE.Vector3(pulse, pulse, pulse), 0.1);
    }
  });

  renderer.render(scene, camera);
}

// ========== 键盘快捷键 ==========
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'k') {
    e.preventDefault();
    searchInput.focus();
  }
  if (e.key === 'Escape') {
    selectedRegion = null;
    document.getElementById('emptyState').style.display = 'flex';
    document.getElementById('regionTitle').textContent = '选择一个脑区开始';
    document.getElementById('regionEnglish').textContent = '';
    document.getElementById('regionSystemTag').style.display = 'none';
    document.getElementById('infoContent').innerHTML = '';
    document.getElementById('infoContent').appendChild(document.getElementById('emptyState'));
    markers.forEach(m => {
      m.scale.set(1, 1, 1);
      m.material.emissiveIntensity = 0.4;
    });
  }
});

// ========== 启动 ==========
try {
  initThree();
  document.getElementById('viewerHint').style.display = 'block';
  document.getElementById('viewerError').style.display = 'none';
  console.log('🧠 交互式大脑解剖学图谱已就绪');
  console.log('   - 21 个核心脑区 | 6 个功能系统 | 8 层深度信息');
} catch (e) {
  console.error('Three.js 初始化失败:', e);
  document.getElementById('viewerHint').style.display = 'none';
  document.getElementById('viewerError').style.display = 'block';
  document.getElementById('viewerError').querySelector('div:last-child').textContent =
    '错误: ' + e.message + ' | 请尝试刷新或使用 Chrome/Edge';
}

// 如果模块加载失败（import 无法被 catch）
window.addEventListener('error', function(e) {
  if (e.target && e.target.tagName === 'SCRIPT') {
    document.getElementById('viewerHint').style.display = 'none';
    document.getElementById('viewerError').style.display = 'block';
  }
});
