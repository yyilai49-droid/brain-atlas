<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大脑解剖学图谱 | 心理学研究生</title>
<style>
/* ====== Taste-Skill Inspired: Academic Anatomical ====== */
:root {
  --paper: #faf7f2;
  --ink: #2c2416;
  --ink-light: #5c5240;
  --ink-muted: #8a8070;
  --accent: #8b3a3a;
  --accent-warm: #c1784a;
  --gold: #b8964a;
  --border: #d8cfc0;
  --surface: #ffffff;
  --shadow: 0 2px 16px rgba(44,36,22,0.06);
  --radius: 6px;
  --transition: 0.25s ease;
  --serif: 'Georgia', 'Noto Serif SC', 'STSong', 'SimSun', serif;
  --sans: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;

  /* System colors */
  --sys-prefrontal: #7c5c8c;
  --sys-limbic: #c4705a;
  --sys-striatal: #d4904a;
  --sys-motor: #4a8a9a;
  --sys-sensory: #3a9886;
  --sys-brainstem: #b89842;
  --sys-whitematter: #8a8a94;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  line-height: 1.6;
}

/* ====== Header ====== */
.site-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}
.site-header .logo {
  font-family: var(--serif);
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--ink);
  white-space: nowrap;
  letter-spacing: 0.5px;
}
.site-header .logo em { font-style: normal; color: var(--accent); }
.site-header .search-box {
  flex: 1; max-width: 360px; position: relative;
}
.site-header .search-box input {
  width: 100%; padding: 7px 14px 7px 34px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--paper);
  font-size: 0.88rem;
  color: var(--ink);
  outline: none;
  transition: var(--transition);
  font-family: var(--sans);
}
.site-header .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(139,58,58,0.08); }
.site-header .search-box .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--ink-muted); font-size: 0.85rem; }
.search-results {
  display: none; position: absolute; top: 100%; left: 0; right: 0;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: 0 8px 24px rgba(0,0,0,0.1); max-height: 320px; overflow-y: auto; margin-top: 4px; z-index: 200;
}
.search-results.active { display: block; }
.search-results .result { padding: 10px 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: background 0.1s; }
.search-results .result:hover { background: #f8f4ee; }
.search-results .result .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.search-results .result .name { font-weight: 600; font-size: 0.88rem; }
.search-results .result .en { font-size: 0.72rem; color: var(--ink-muted); margin-left: auto; font-style: italic; }

.header-actions { display: flex; gap: 6px; }
.header-btn {
  padding: 6px 14px; border: 1px solid var(--border); background: var(--surface);
  border-radius: 20px; cursor: pointer; font-size: 0.82rem; color: var(--ink-light);
  transition: var(--transition); font-family: var(--sans); white-space: nowrap;
}
.header-btn:hover { background: var(--paper); border-color: var(--accent); color: var(--accent); }
.header-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

/* ====== Layout ====== */
.main-layout {
  display: flex;
  min-height: calc(100vh - 56px);
  max-width: 1440px;
  margin: 0 auto;
}

/* Brain illustration area */
.illustration-area {
  flex: 1;
  min-width: 0;
  padding: 32px 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.view-panel { display: none; width: 100%; max-width: 700px; }
.view-panel.active { display: block; }

.view-title {
  font-family: var(--serif);
  font-size: 1rem;
  color: var(--ink-muted);
  text-align: center;
  margin-bottom: 16px;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.view-title span { color: var(--accent); font-style: italic; text-transform: none; letter-spacing: 0; }

.brain-svg-container {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
  box-shadow: var(--shadow);
  cursor: default;
}

.brain-svg-container svg { width: 100%; height: auto; display: block; }

/* SVG interaction */
.brain-region-path {
  cursor: pointer;
  transition: fill-opacity 0.2s, filter 0.2s;
}
.brain-region-path:hover {
  filter: brightness(0.88);
}
.brain-region-path.selected {
  filter: brightness(0.8) drop-shadow(0 0 4px rgba(0,0,0,0.3));
}

/* Label lines */
.anatomy-label {
  font-family: var(--serif);
  font-size: 10px;
  fill: var(--ink);
  pointer-events: none;
  user-select: none;
}
.anatomy-leader {
  stroke: var(--ink-light);
  stroke-width: 0.5;
  fill: none;
  pointer-events: none;
}

/* ====== Info panel ====== */
.info-panel {
  width: 420px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  box-shadow: -2px 0 12px rgba(0,0,0,0.03);
}
.panel-header {
  padding: 24px 24px 16px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--surface);
  z-index: 10;
}
.panel-header .region-name {
  font-family: var(--serif);
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
}
.panel-header .region-en {
  font-size: 0.82rem;
  color: var(--ink-muted);
  font-style: italic;
  margin-top: 4px;
}
.panel-header .region-tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 0.7rem;
  font-weight: 600;
  color: white;
  margin-top: 8px;
  letter-spacing: 0.5px;
}
.panel-body { padding: 20px 24px 32px; }

.empty-state {
  text-align: center;
  padding: 64px 32px;
  color: var(--ink-muted);
}
.empty-state .icon { font-size: 3.5rem; opacity: 0.4; margin-bottom: 16px; }
.empty-state h3 { font-family: var(--serif); font-size: 1.2rem; color: var(--ink-light); margin-bottom: 8px; }
.empty-state p { font-size: 0.88rem; max-width: 280px; margin: 0 auto; line-height: 1.7; }

.info-block {
  margin-bottom: 18px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.info-block-header {
  padding: 12px 16px;
  background: #faf8f5;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 600;
  font-size: 0.9rem;
  font-family: var(--sans);
  user-select: none;
  transition: background 0.15s;
}
.info-block-header:hover { background: #f2efe8; }
.info-block-header .arrow {
  margin-left: auto;
  font-size: 0.65rem;
  color: var(--ink-muted);
  transition: transform 0.2s;
}
.info-block.collapsed .arrow { transform: rotate(-90deg); }
.info-block.collapsed .info-block-body { display: none; }
.info-block-body {
  padding: 14px 16px;
  font-size: 0.86rem;
  line-height: 1.75;
  color: var(--ink-light);
}
.info-block-body p { margin-bottom: 6px; }
.info-block-body p:last-child { margin-bottom: 0; }

.subnucleus-card {
  padding: 10px 14px;
  background: #faf8f5;
  border-radius: 4px;
  border-left: 3px solid var(--accent);
  margin-bottom: 8px;
}
.subnucleus-card .sub-name { font-weight: 700; color: var(--ink); font-size: 0.84rem; }
.subnucleus-card .sub-desc { font-size: 0.8rem; color: var(--ink-light); margin-top: 2px; }

.tag-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
.tag {
  padding: 2px 9px; background: #f2efe8; border-radius: 10px;
  font-size: 0.77rem; color: var(--ink-light); white-space: nowrap;
}

.citation {
  padding: 10px 14px; background: #fdfaf3; border-left: 3px solid var(--gold);
  border-radius: 4px; margin-bottom: 6px; font-size: 0.8rem;
}
.citation .author { font-weight: 700; color: var(--ink); }
.citation .journal { color: var(--ink-muted); }

.clinical-note {
  padding: 12px 16px; background: #fdf5f4; border-left: 3px solid var(--accent-warm);
  border-radius: 4px; font-size: 0.82rem; color: #7a3a2a; margin-top: 8px;
}
.clinical-note strong { color: #a04030; }

/* View thumbnails for switching */
.view-tabs {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.view-tab {
  padding: 8px 18px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.82rem;
  font-family: var(--sans);
  color: var(--ink-light);
  transition: var(--transition);
}
.view-tab:hover { border-color: var(--accent); color: var(--accent); }
.view-tab.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* Legend */
.legend { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 16px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.72rem; color: var(--ink-muted); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Footer */
.site-footer {
  text-align: center;
  padding: 16px;
  font-size: 0.75rem;
  color: var(--ink-muted);
  border-top: 1px solid var(--border);
  background: var(--surface);
}
.site-footer span { font-family: var(--serif); font-style: italic; }

/* ====== Responsive ====== */
@media (max-width: 1024px) {
  .info-panel { width: 340px; }
  .illustration-area { padding: 20px 12px; }
}
@media (max-width: 768px) {
  .main-layout { flex-direction: column; }
  .illustration-area { padding: 16px; }
  .info-panel { width: 100%; border-left: none; border-top: 1px solid var(--border); max-height: 60vh; }
  .site-header { padding: 0 12px; gap: 10px; }
  .site-header .search-box { max-width: 160px; }
  .header-btn { padding: 5px 10px; font-size: 0.75rem; }
}

@media print {
  .site-header, .info-panel, .site-footer, .view-tabs { display: none; }
  .main-layout { display: block; }
  .illustration-area { padding: 0; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="logo"><em>Neuro</em>Atlas</div>
  <div class="search-box">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="搜索脑区 (杏仁核, dlPFC, VTA...)" autocomplete="off">
    <div class="search-results" id="searchResults"></div>
  </div>
  <div class="header-actions">
    <button class="header-btn" onclick="startQuiz()">✎ 自测</button>
  </div>
</header>

<div class="main-layout">
  <!-- 大脑解剖图区域 -->
  <main class="illustration-area">
    <div>
      <div class="view-tabs">
        <button class="view-tab active" onclick="switchView('lateral')">外侧面 (Lateral)</button>
        <button class="view-tab" onclick="switchView('medial')">内侧面 (Medial)</button>
        <button class="view-tab" onclick="switchView('coronal')">冠状面 (Coronal)</button>
        <button class="view-tab" onclick="switchView('basal')">底面 (Basal)</button>
      </div>

      <!-- 外侧面 -->
      <div class="view-panel active" id="view-lateral">
        <div class="view-title">外侧面观 <span>Lateral View</span></div>
        <div class="brain-svg-container">
          <svg viewBox="0 0 640 440" id="svg-lateral"></svg>
        </div>
      </div>

      <!-- 内侧面 -->
      <div class="view-panel" id="view-medial">
        <div class="view-title">内侧面观 <span>Medial / Sagittal View</span></div>
        <div class="brain-svg-container">
          <svg viewBox="0 0 520 500" id="svg-medial"></svg>
        </div>
      </div>

      <!-- 冠状面 -->
      <div class="view-panel" id="view-coronal">
        <div class="view-title">冠状面 <span>Coronal View</span></div>
        <div class="brain-svg-container">
          <svg viewBox="0 0 440 440" id="svg-coronal"></svg>
        </div>
      </div>

      <!-- 底面 -->
      <div class="view-panel" id="view-basal">
        <div class="view-title">底面观 <span>Basal View</span></div>
        <div class="brain-svg-container">
          <svg viewBox="0 0 520 440" id="svg-basal"></svg>
        </div>
      </div>

      <div class="legend" id="legend"></div>
    </div>
  </main>

  <!-- 信息面板 -->
  <aside class="info-panel" id="infoPanel">
    <div class="panel-header" id="panelHeader">
      <div class="region-name" id="regionName">大脑解剖学图谱</div>
      <div class="region-en" id="regionEn">一个面向心理学研究生的交互式大脑学习工具</div>
      <div class="region-tag" id="regionTag" style="display:none;"></div>
    </div>
    <div class="panel-body" id="panelBody">
      <div class="empty-state">
        <div class="icon">🧠</div>
        <h3>交互式大脑解剖学图谱</h3>
        <p>点击左侧解剖图上彩色标注的脑区，查看详细信息。</p>
        <p style="margin-top:12px;font-size:0.78rem;">多个解剖视角 · 21 个核心脑区 · 8 层深度信息</p>
      </div>
    </div>
  </aside>
</div>

<footer class="site-footer">
  NeuroAtlas — 面向心理学研究生的大脑解剖学工具 · <span>Jim @ BSU心理学院</span>
</footer>

<script src="data/regions.js"></script>
<script>
// ========== 绘制解剖图 ==========
const svgNS = 'http://www.w3.org/2000/svg';
let selectedRegionId = null;

function S(tag) { return document.createElementNS(svgNS, tag); }
function A(el, attrs) { for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v); return el; }

// 查找脑区颜色
function rColor(id) { const r = brainRegions.find(x => x.id === id); return r ? r.color : '#aaa'; }

// 创建可点击脑区
function regionPath(svg, d, regionId, opacity, label, lx, ly) {
  const g = S('g');
  const path = S('path');
  A(path, {
    d, class: 'brain-region-path',
    'data-region': regionId,
    fill: rColor(regionId),
    'fill-opacity': opacity || 0.35,
    stroke: rColor(regionId),
    'stroke-width': '1.2',
    'stroke-opacity': '0.7'
  });
  path.addEventListener('click', (e) => { e.stopPropagation(); selectRegion(regionId); });
  path.addEventListener('mouseenter', function() { this.setAttribute('fill-opacity', Math.min(1, (opacity||0.35)+0.3)); });
  path.addEventListener('mouseleave', function() { this.setAttribute('fill-opacity', opacity||0.35); });
  g.appendChild(path);

  if (label) {
    const t = S('text');
    A(t, { x: lx, y: ly, class: 'anatomy-label', fill: rColor(regionId), 'font-size': '9', 'font-weight': '600' });
    t.textContent = label;
    g.appendChild(t);
  }
  svg.appendChild(g);
  return path;
}

// 结构线条 (非交互)
function structurePath(svg, d, color, width, dash) {
  const p = S('path');
  A(p, { d, fill: 'none', stroke: color, 'stroke-width': width||1.2, 'stroke-linecap': 'round', 'stroke-linejoin': 'round' });
  if (dash) A(p, { 'stroke-dasharray': dash });
  svg.appendChild(p);
  return p;
}

// 填充形状 (非交互)
function fillPath(svg, d, color, opacity) {
  const p = S('path');
  A(p, { d, fill: color, 'fill-opacity': opacity||1, stroke: 'none' });
  svg.appendChild(p);
  return p;
}

// ===== 外侧面 =====
function drawLateral() {
  const svg = document.getElementById('svg-lateral');
  svg.innerHTML = '';

  // 背景网格
  structurePath(svg, 'M0,220 L640,220 M320,0 L320,440', '#e8e0d4', 0.3, '8,12');

  // 大脑皮层轮廓 (左侧面观, 鼻向右)
  // 外轮廓 - 真实的脑形
  fillPath(svg,
    'M105,68 C90,76 72,100 62,128 C52,156 48,184 54,210 ' +
    'C58,228 68,248 82,262 C96,276 112,286 130,292 ' +
    'C148,298 168,300 188,298 C208,296 228,288 244,274 ' +
    'C260,260 274,240 282,216 C290,192 294,166 292,140 ' +
    'C290,114 284,92 272,74 C260,56 244,44 226,38 ' +
    'C208,32 188,32 168,36 C148,40 130,48 118,56 C108,60 105,64 105,68 Z',
    '#e8d8c8', 0.9);

  // 大脑皮层底纹
  fillPath(svg,
    'M108,70 C94,78 76,102 66,130 C56,158 52,186 58,212 ' +
    'C62,230 72,250 86,264 C100,278 116,288 134,294 ' +
    'C152,300 172,302 192,300 C212,298 232,290 248,276 ' +
    'C264,262 278,242 286,218 C294,194 298,168 296,142 ' +
    'C294,116 288,94 276,76 C264,58 248,46 230,40 ' +
    'C212,34 192,34 172,38 C152,42 134,50 122,58 C112,62 108,66 108,70 Z',
    '#f2e8dc', 0.5);

  // 主要沟裂
  // 中央沟 (central sulcus) - 从顶部向下前方弯曲
  structurePath(svg,
    'M225,42 C230,60 232,80 228,100 C224,120 216,140 206,160 C196,180 186,200 180,216 C176,228 176,236 180,240',
    '#8b6a50', 2.5);

  // 外侧裂 (Sylvian fissure) - 从下方斜向上
  structurePath(svg,
    'M88,198 C100,195 120,192 140,188 C160,184 180,178 200,170 C220,162 240,152 256,140 C268,130 278,118 284,106',
    '#8b6a50', 2.2);

  // 顶枕沟
  structurePath(svg, 'M270,84 C276,100 278,118 275,136 C272,150 264,162 254,172', '#8b6a50', 1.5);

  // 额叶沟回纹理
  for (let i = 0; i < 5; i++) {
    const y = 80 + i * 25;
    structurePath(svg, `M130,${y} C150,${y-5} 180,${y-8} 210,${y-2}`, '#b89880', 0.7);
  }

  // 颞叶沟回
  for (let i = 0; i < 4; i++) {
    const x = 110 + i * 30;
    structurePath(svg, `M${x},210 C${x+5},225 ${x+2},245 ${x-3},258`, '#b89880', 0.7);
  }

  // 小脑 (后下方)
  fillPath(svg,
    'M256,268 C268,270 282,274 292,282 C302,290 308,302 306,314 ' +
    'C304,326 296,334 284,338 C272,342 258,344 248,342 C238,340 232,336 230,330 ' +
    'C228,322 232,312 240,304 C244,300 250,296 255,292 C252,288 250,280 248,272 Z',
    '#d4c0a8', 0.8);
  // 小脑叶片
  for (let i = 0; i < 6; i++) {
    structurePath(svg,
      `M${244+i*8},${276+i*7} C${250+i*8},${280+i*7} ${260+i*7},${284+i*6} ${272+i*5},${282+i*5}`,
      '#b89878', 0.6);
  }

  // 脑干 (中脑/脑桥/延髓)
  fillPath(svg,
    'M226,296 C222,302 218,312 216,324 C214,338 215,352 218,362 ' +
    'C221,370 226,374 232,374 C238,374 242,370 244,362 ' +
    'C246,352 246,338 244,324 C242,312 238,302 234,296 Z',
    '#d0b898', 0.8);

  // === 脑区高亮 ===
  // 额叶 (frontal lobe)
  regionPath(svg,
    'M105,68 C90,76 72,100 62,128 C52,156 48,184 54,210 C58,228 68,248 82,262 C96,276 112,286 130,292 C148,298 168,300 188,298 C208,296 225,290 225,290 L225,42 C190,32 150,30 120,40 C108,44 105,60 105,68 Z',
    'dlpfc', 0.08, '额叶 (Frontal Lobe)', 140, 52);

  // dlPFC 标记区域
  regionPath(svg,
    'M130,60 C150,54 180,48 210,50 C218,52 224,58 226,68 C224,90 220,110 212,130 C204,148 194,164 184,178 C176,190 170,198 168,202 C160,200 148,198 138,194 C128,188 120,178 116,168 C112,156 110,140 112,124 C114,106 120,84 130,60 Z',
    'dlpfc', 0.18, 'dlPFC', 172, 105);

  // 运动皮层 M1 标记
  regionPath(svg,
    'M222,48 C225,60 226,80 224,100 C222,118 216,136 208,152 C200,166 192,178 186,188 C190,186 198,182 208,178 C218,172 230,164 238,152 C246,140 252,124 254,106 C256,86 254,64 248,48 Z',
    'm1', 0.2, 'M1', 246, 86);

  // 体感皮层
  regionPath(svg,
    'M222,48 C220,60 218,80 220,100 C222,118 226,136 232,152 C238,168 244,180 248,190 C256,184 266,174 274,160 C282,146 288,128 290,108 C292,88 288,66 280,50 C270,38 256,32 242,30 C234,36 228,42 222,48 Z',
    's1', 0.15, 'S1', 280, 70);

// ===== 绘制所有视图 =====
function drawAll() {
  drawLateral();
  drawMedial();
  drawCoronal();
  drawBasal();
  updateLegend();
}

function updateLegend() {
  const legend = document.getElementById('legend');
  const systems = {};
  brainRegions.forEach(r => {
    if (!systems[r.systemName]) systems[r.systemName] = r.color;
  });
  legend.innerHTML = Object.entries(systems).map(([name, color]) =>
    `<span class="legend-item"><span class="legend-dot" style="background:${color}"></span>${name}</span>`
  ).join('');
}

// ===== 视图切换 =====
function switchView(view) {
  document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.querySelectorAll('.view-tab').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  selectedRegionId = null;
  resetHighlights();
}

function resetHighlights() {
  document.querySelectorAll('.brain-region-path').forEach(p => {
    p.classList.remove('selected');
  });
}

// ===== 选择脑区 =====
function selectRegion(regionId) {
  resetHighlights();
  selectedRegionId = regionId;

  // 高亮所有视图中该脑区的 path
  document.querySelectorAll(`.brain-region-path[data-region="${regionId}"]`).forEach(p => {
    p.classList.add('selected');
  });

  const region = brainRegions.find(r => r.id === regionId);
  if (!region) return;
  updateInfoPanel(region);
}

// ===== 信息面板 =====
function updateInfoPanel(region) {
  document.getElementById('regionName').textContent = region.name;
  document.getElementById('regionEn').textContent = region.nameEn;
  const tag = document.getElementById('regionTag');
  tag.style.display = 'inline-block';
  tag.textContent = region.systemName;
  tag.style.background = region.color;

  const l = region.layers;
  let h = '';

  if (l.anatomy) {
    h += block('📍 解剖位置',
      '<p><b>位置：</b>' + l.anatomy.location + '</p>' +
      '<p><b>外观：</b>' + (l.anatomy.appearance||'') + '</p>' +
      '<p><b>毗邻：</b>' + (l.anatomy.relations||'') + '</p>' +
      (l.anatomy.size ? '<p><b>体积：</b>' + l.anatomy.size + '</p>' : '')
    );
  }

  if (l.cytoarchitecture && l.cytoarchitecture.subnuclei && l.cytoarchitecture.subnuclei.length > 0) {
    let ch = '';
    if (l.cytoarchitecture.special) ch += '<p style="margin-bottom:10px;">💡 <em>' + l.cytoarchitecture.special + '</em></p>';
    l.cytoarchitecture.subnuclei.forEach(s => {
      ch += '<div class="subnucleus-card"><div class="sub-name">' + s.name + '</div><div class="sub-desc">' + s.desc + '</div></div>';
    });
    if (l.cytoarchitecture.cellTypes) {
      ch += '<p style="margin-top:8px;"><b>细胞类型：</b></p><div class="tag-row">';
      l.cytoarchitecture.cellTypes.forEach(c => { ch += '<span class="tag">' + c + '</span>'; });
      ch += '</div>';
    }
    h += block('🧬 细胞构筑与亚核', ch);
  }

  if (l.functions) {
    let fh = '<p><b>核心功能：</b>' + l.functions.primary + '</p>';
    if (l.functions.computational) fh += '<p style="margin-top:6px;"><b>计算角色：</b>' + l.functions.computational + '</p>';
    if (l.functions.dissociations) fh += '<p style="margin-top:6px;"><b>功能分离：</b>' + l.functions.dissociations + '</p>';
    if (l.functions.paradigms) {
      fh += '<p style="margin-top:6px;"><b>研究范式：</b></p><div class="tag-row">';
      l.functions.paradigms.forEach(p => { fh += '<span class="tag">' + p + '</span>'; });
      fh += '</div>';
    }
    h += block('⚡ 主要功能', fh);
  }

  if (l.connectivity) {
    let ch = '';
    if (l.connectivity.inputs) {
      ch += '<p><b>⬇ 传入：</b></p><div class="tag-row">';
      l.connectivity.inputs.forEach(i => { ch += '<span class="tag">' + i + '</span>'; });
      ch += '</div>';
    }
    if (l.connectivity.outputs) {
      ch += '<p style="margin-top:8px;"><b>⬆ 传出：</b></p><div class="tag-row">';
      l.connectivity.outputs.forEach(o => { ch += '<span class="tag">' + o + '</span>'; });
      ch += '</div>';
    }
    if (l.connectivity.keyCircuits) {
      ch += '<p style="margin-top:8px;"><b>核心环路：</b></p><ul style="padding-left:18px;font-size:0.82rem;">';
      l.connectivity.keyCircuits.forEach(c => { ch += '<li>' + c + '</li>'; });
      ch += '</ul>';
    }
    h += block('🔗 连接组', ch);
  }

  if (l.neurotransmitters) {
    let nh = '<div class="tag-row">';
    l.neurotransmitters.forEach(nt => { nh += '<span class="tag">' + nt + '</span>'; });
    nh += '</div>';
    h += block('⚗️ 神经递质', nh);
  }

  if (l.clinicalRelevance) {
    let ch = '';
    if (l.clinicalRelevance.disorders) {
      ch += '<p><b>相关疾病：</b></p><div class="tag-row">';
      l.clinicalRelevance.disorders.forEach(d => { ch += '<span class="tag">' + d + '</span>'; });
      ch += '</div>';
    }
    if (l.clinicalRelevance.symptoms) ch += '<p style="margin-top:6px;"><b>功能障碍：</b>' + l.clinicalRelevance.symptoms + '</p>';
    if (l.clinicalRelevance.treatments) {
      ch += '<p style="margin-top:6px;"><b>治疗：</b></p><div class="tag-row">';
      l.clinicalRelevance.treatments.forEach(t => { ch += '<span class="tag">' + t + '</span>'; });
      ch += '</div>';
    }
    if (l.clinicalRelevance.keyNote) ch += '<div class="clinical-note"><strong>⚠ 临床要点：</strong>' + l.clinicalRelevance.keyNote + '</div>';
    h += block('🏥 临床关联', ch);
  }

  if (l.research) {
    let rh = '';
    if (l.research.classicPapers) {
      l.research.classicPapers.forEach(cp => {
        rh += '<div class="citation"><span class="author">' + cp.author + '</span><br>"' + cp.title + '"<br><span class="journal">' + cp.journal + '</span></div>';
      });
    }
    if (l.research.recentFindings) rh += '<p style="margin-top:8px;"><b>🔬 最新发现：</b>' + l.research.recentFindings + '</p>';
    if (l.research.debates) rh += '<p style="margin-top:6px;"><b>💬 争论：</b>' + l.research.debates + '</p>';
    h += block('📚 关键研究', rh);
  }

  document.getElementById('panelBody').innerHTML = h;

  // 折叠交互
  document.querySelectorAll('.info-block-header').forEach(hdr => {
    hdr.addEventListener('click', () => hdr.parentElement.classList.toggle('collapsed'));
  });
}

function block(title, body) {
  return '<div class="info-block"><div class="info-block-header">' + title + '<span class="arrow">▼</span></div><div class="info-block-body">' + body + '</div></div>';
}

// ===== 搜索 =====
const si = document.getElementById('searchInput');
const sr = document.getElementById('searchResults');
let selIdx = -1;

si.addEventListener('input', () => {
  const q = si.value.trim().toLowerCase();
  sr.innerHTML = '';
  selIdx = -1;
  if (q.length < 1) { sr.classList.remove('active'); return; }

  const matches = brainRegions.filter(r =>
    r.name.includes(q) || r.nameEn.toLowerCase().includes(q) || r.id.includes(q) || r.systemName.includes(q)
  );
  if (matches.length === 0) {
    sr.innerHTML = '<div style="padding:12px;text-align:center;color:var(--ink-muted);">未找到</div>';
    sr.classList.add('active');
    return;
  }
  matches.forEach((r, i) => {
    const d = document.createElement('div');
    d.className = 'result';
    d.innerHTML = '<span class="dot" style="background:' + r.color + '"></span><span class="name">' + r.name + '</span><span class="en">' + r.nameEn.split('(')[0].trim() + '</span>';
    d.addEventListener('click', () => { selectRegion(r.id); sr.classList.remove('active'); si.value = ''; });
    sr.appendChild(d);
  });
  sr.classList.add('active');
});

si.addEventListener('keydown', (e) => {
  const items = sr.querySelectorAll('.result');
  if (e.key === 'ArrowDown') { e.preventDefault(); selIdx = Math.min(selIdx+1, items.length-1); items.forEach((it,i) => it.style.background = i===selIdx ? '#f8f4ee' : ''); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); selIdx = Math.max(selIdx-1, 0); items.forEach((it,i) => it.style.background = i===selIdx ? '#f8f4ee' : ''); }
  else if (e.key === 'Enter' && selIdx >= 0 && items[selIdx]) { e.preventDefault(); items[selIdx].click(); }
  else if (e.key === 'Escape') { sr.classList.remove('active'); si.blur(); }
});

document.addEventListener('click', e => { if (!e.target.closest('.search-box')) sr.classList.remove('active'); });

// ===== 自测 =====
function startQuiz() {
  const region = brainRegions[Math.floor(Math.random() * brainRegions.length)];
  document.getElementById('regionName').textContent = '✎ 自测模式';
  document.getElementById('regionEn').textContent = '请在解剖图上找到对应脑区并点击';
  document.getElementById('regionTag').style.display = 'none';
  document.getElementById('panelBody').innerHTML =
    '<div style="text-align:center;padding:32px 20px;">' +
    '<div style="font-size:1.3rem;font-weight:700;margin-bottom:8px;">找到：<span style="color:' + region.color + '">' + region.name + '</span></div>' +
    '<div style="color:var(--ink-muted);margin-bottom:16px;">' + region.nameEn + '</div>' +
    '<div class="tag-row" style="justify-content:center;"><span class="tag" style="background:' + region.color + ';color:white;">' + region.systemName + '</span></div>' +
    '<button onclick="selectRegion(\'' + region.id + '\')" style="margin-top:16px;padding:10px 24px;background:var(--ink-light);color:white;border:none;border-radius:20px;cursor:pointer;font-size:0.9rem;">显示答案</button>' +
    '</div>';
}

// ===== 键盘 =====
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'k') { e.preventDefault(); si.focus(); }
  if (e.key === 'Escape' && selectedRegionId) {
    resetHighlights();
    selectedRegionId = null;
    document.getElementById('regionName').textContent = '大脑解剖学图谱';
    document.getElementById('regionEn').textContent = '一个面向心理学研究生的交互式大脑学习工具';
    document.getElementById('regionTag').style.display = 'none';
    document.getElementById('panelBody').innerHTML = '<div class="empty-state"><div class="icon">🧠</div><h3>交互式大脑解剖学图谱</h3><p>点击左侧解剖图上彩色标注的脑区，查看详细信息。</p></div>';
  }
});

// ===== 启动 =====
drawAll();
</script>
