<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大脑解剖学图谱 | 交互式3D</title>
<style>
:root {
  --bg: #faf8f5; --surface: #fff; --ink: #2c2416; --ink-light: #5c5240;
  --ink-muted: #8a8070; --border: #e0d8cc; --accent: #8b3a3a;
  --radius: 6px; --shadow: 0 2px 16px rgba(0,0,0,0.05);
  --sans: 'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  --serif: 'Georgia','Noto Serif SC','STSong',serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);overflow:hidden;height:100vh}

.topbar{
  height:48px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100;position:relative;
}
.topbar .logo{font-family:var(--serif);font-size:1.05rem;font-weight:700;white-space:nowrap}
.topbar .logo em{font-style:normal;color:var(--accent)}
.topbar .search{flex:1;max-width:300px;position:relative}
.topbar .search input{
  width:100%;padding:6px 12px 6px 30px;border:1px solid var(--border);border-radius:16px;
  background:var(--bg);font-size:0.82rem;outline:none;font-family:var(--sans);
}
.topbar .search input:focus{border-color:var(--accent)}
.topbar .search .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink-muted);font-size:0.8rem}
.sdrop{
  display:none;position:absolute;top:100%;left:0;right:0;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,0.1);
  max-height:260px;overflow-y:auto;margin-top:4px;z-index:200;
}
.sdrop.on{display:block}
.sdrop .sr{padding:9px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:0.82rem}
.sdrop .sr:hover{background:#f8f4ee}
.sdrop .sr .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

.tbar-btns{display:flex;gap:5px}
.tbtn{
  padding:5px 12px;border:1px solid var(--border);background:var(--surface);border-radius:14px;
  cursor:pointer;font-size:0.78rem;color:var(--ink-light);font-family:var(--sans);white-space:nowrap;transition:.2s;
}
.tbtn:hover,.tbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}

.main{display:flex;height:calc(100vh - 48px)}

/* 3D viewer */
.viewer{flex:1;background:#1c1a18;position:relative;min-width:0}
.viewer canvas{display:block}
.vhint{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,0.25);font-size:0.78rem;pointer-events:none;transition:opacity 0.5s;
}
.vhint.fade{opacity:0}

/* 2D slice overlay */
.slice-overlay{
  display:none;position:absolute;inset:0;background:#f5f0eb;overflow:auto;z-index:10;
}
.slice-overlay.on{display:flex;align-items:flex-start;justify-content:center;gap:12px;padding:16px;flex-wrap:wrap}
.slice-overlay .slice-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px;text-align:center;max-width:340px;min-width:260px;flex:1;
}
.slice-card .sc-title{font-weight:600;font-size:0.85rem;margin-bottom:8px;color:var(--ink-light)}
.slice-card svg{width:100%;height:auto}

/* Info panel */
.panel{
  width:380px;background:var(--surface);border-left:1px solid var(--border);
  overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;
}
.phead{
  padding:18px 20px 12px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--surface);z-index:10;
}
.phead .pname{font-family:var(--serif);font-size:1.4rem;font-weight:700;line-height:1.2}
.phead .pen{font-size:0.78rem;color:var(--ink-muted);font-style:italic;margin-top:2px}
.phead .ptag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.68rem;font-weight:600;color:#fff;margin-top:6px}
.pbody{padding:14px 20px 24px}

.empty{text-align:center;padding:48px 24px;color:var(--ink-muted)}
.empty .eicon{font-size:3rem;opacity:0.35;margin-bottom:12px}
.empty h3{font-family:var(--serif);font-size:1.1rem;color:var(--ink-light);margin-bottom:8px}
.empty p{font-size:0.84rem;max-width:260px;margin:0 auto}

/* Concise info card */
.cinfo{margin-bottom:14px}
.cinfo .ci-title{font-weight:700;font-size:0.88rem;color:var(--ink);margin-bottom:4px}
.cinfo .ci-text{font-size:0.82rem;color:var(--ink-light);line-height:1.65}
.cinfo .ci-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.cinfo .ci-tags span{padding:2px 8px;background:#f2efe8;border-radius:8px;font-size:0.74rem;color:var(--ink-light)}

.cinfo .ci-detail{display:none;margin-top:8px;padding:10px 12px;background:#faf8f5;border-radius:4px;font-size:0.8rem;line-height:1.7;color:var(--ink-light)}
.cinfo .ci-detail.on{display:block}
.cinfo .ci-toggle{
  font-size:0.76rem;color:var(--accent);cursor:pointer;margin-top:4px;display:inline-block;
  user-select:none;
}
.cinfo .ci-toggle:hover{text-decoration:underline}

@media(max-width:768px){
  .main{flex-direction:column}
  .viewer{height:45vh}
  .panel{width:100%;max-height:50vh}
  .topbar{padding:0 8px;gap:6px}
  .topbar .search{max-width:140px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><em>Neuro</em>Atlas</div>
  <div class="search">
    <span class="si">⌕</span>
    <input type="text" id="si" placeholder="搜索脑区... (Ctrl+K)" autocomplete="off">
    <div class="sdrop" id="sdrop"></div>
  </div>
  <div class="tbar-btns">
    <button class="tbtn on" data-v="3d" onclick="setView('3d')">3D 大脑</button>
    <button class="tbtn" data-v="slice" onclick="setView('slice')">解剖切面</button>
    <button class="tbtn" onclick="startQuiz()">自测</button>
  </div>
</div>

<div class="main">
  <div class="viewer" id="viewer">
    <div id="tcont"></div>
    <div class="vhint" id="vhint">🖱 拖拽旋转 &nbsp;|&nbsp; 滚轮缩放 &nbsp;|&nbsp; 点击色球查看脑区</div>
    <div class="slice-overlay" id="slices"></div>
  </div>

  <aside class="panel" id="panel">
    <div class="phead">
      <div class="pname" id="pname">大脑解剖学图谱</div>
      <div class="pen" id="pen">交互式 3D 大脑 · 面向心理学研究生</div>
      <div class="ptag" id="ptag" style="display:none"></div>
    </div>
    <div class="pbody" id="pbody">
      <div class="empty"><div class="eicon">🧠</div><h3>交互式大脑解剖学图谱</h3><p>旋转 3D 大脑，点击彩色标记球体查看脑区信息。</p><p style="margin-top:8px;font-size:0.76rem">21 个核心脑区 · 4 个解剖切面 · 可展开详情</p></div>
    </div>
  </aside>
</div>

<script src="data/regions.js"></script>
<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ===== 3D 场景 =====
let scene,camera,renderer,controls,brainGroup,markers=[],hovered=null,selected=null;
const raycaster=new THREE.Raycaster(),mouse=new THREE.Vector2();

function init3D(){
  const c=document.getElementById('tcont');
  scene=new THREE.Scene();
  scene.background=new THREE.Color('#1c1a18');
  scene.fog=new THREE.Fog('#1c1a18',6,28);

  camera=new THREE.PerspectiveCamera(48,c.clientWidth/c.clientHeight,0.5,40);
  camera.position.set(9,4,12);camera.lookAt(0,0,0);

  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(c.clientWidth,c.clientHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled=true;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.1;
  c.appendChild(renderer.domElement);

  controls=new OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true;controls.dampingFactor=0.08;
  controls.minDistance=5;controls.maxDistance=22;
  controls.target.set(0,0,-1);controls.update();

  // 灯光
  scene.add(new THREE.AmbientLight('#443830',2.5));
  const key=new THREE.DirectionalLight('#fff8f0',5);
  key.position.set(8,10,6);key.castShadow=true;
  key.shadow.mapSize.set(2048,2048);key.shadow.camera.near=0.5;key.shadow.camera.far=50;
  scene.add(key);
  const fill=new THREE.DirectionalLight('#8899bb',1.2);
  fill.position.set(-4,2,-3);scene.add(fill);
  const rim=new THREE.DirectionalLight('#ffffff',0.8);
  rim.position.set(0,-1,8);scene.add(rim);

  buildBrain();

  renderer.domElement.addEventListener('click',onClick);
  renderer.domElement.addEventListener('mousemove',onMove);
  window.addEventListener('resize',onResize);

  setTimeout(()=>document.getElementById('vhint')?.classList.add('fade'),8000);
  animate();
}

// ===== 生成脑沟纹理 =====
function makeBrainMaps(){
  const c=document.createElement('canvas');c.width=2048;c.height=1024;
  const ctx=c.getContext('2d');
  // 基底
  ctx.fillStyle='#c8a898';ctx.fillRect(0,0,c.width,c.height);
  // 脑沟线条
  function sulcus(x1,y1,len,angle,w){
    ctx.beginPath();ctx.moveTo(x1,y1);
    const mx=(x1+Math.cos(angle)*len/2)+(Math.random()-.5)*120;
    const my=(y1+Math.sin(angle)*len/2)+(Math.random()-.5)*80;
    const x2=x1+Math.cos(angle)*len,y2=y1+Math.sin(angle)*len;
    ctx.quadraticCurveTo(mx,my,Math.min(c.width,Math.max(0,x2)),Math.min(c.height,Math.max(0,y2)));
    ctx.strokeStyle='#8b6a50';ctx.lineWidth=w;ctx.lineCap='round';ctx.stroke();
    // highlight edge
    ctx.beginPath();ctx.moveTo(x1,y1);
    ctx.quadraticCurveTo(mx+2,my+2,Math.min(c.width,Math.max(0,x2+2)),Math.min(c.height,Math.max(0,y2+2)));
    ctx.strokeStyle='#dcc8b8';ctx.lineWidth=w*.35;ctx.stroke();
  }
  for(let i=0;i<120;i++){
    sulcus(Math.random()*c.width,Math.random()*c.height,40+Math.random()*280,Math.random()*Math.PI*2,2+Math.random()*10);
  }
  // 中央沟
  ctx.strokeStyle='#7a5540';ctx.lineWidth=8;
  ctx.beginPath();ctx.moveTo(c.width*.25,c.height*.3);
  ctx.quadraticCurveTo(c.width*.5,c.height*.52,c.width*.75,c.height*.35);ctx.stroke();
  ctx.strokeStyle='#d4bcac';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(c.width*.25+2,c.height*.3+2);
  ctx.quadraticCurveTo(c.width*.5+2,c.height*.52+2,c.width*.75+2,c.height*.35+2);ctx.stroke();

  const tex=new THREE.CanvasTexture(c);tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
  const bump=new THREE.CanvasTexture(c);bump.wrapS=bump.wrapT=THREE.RepeatWrapping;
  return {map:tex,bumpMap:bump,bumpScale:.06};
}

// ===== 构建大脑 =====
function buildBrain(){
  brainGroup=new THREE.Group();scene.add(brainGroup);
  const mats=makeBrainMaps();
  const cortexMat=new THREE.MeshStandardMaterial({
    map:mats.map,bumpMap:mats.bumpMap,bumpScale:.04,
    color:'#d4b8a8',roughness:.45,metalness:.02
  });

  // 创建半球 — 多个变形球体
  function hemi(side){
    const sx=side>0?1:-1;const g=new THREE.Group();
    // 主体
    const m1=new THREE.Mesh(new THREE.SphereGeometry(2.5,96,64),cortexMat);
    m1.scale.set(.82,1.05,.88);m1.position.set(sx*.85,.4,-.25);m1.castShadow=true;m1.receiveShadow=true;g.add(m1);
    // 枕叶
    const m2=new THREE.Mesh(new THREE.SphereGeometry(1.7,64,40),cortexMat);
    m2.scale.set(.68,.78,.85);m2.position.set(sx*.55,-.15,-1.7);m2.castShadow=true;g.add(m2);
    // 颞叶
    const m3=new THREE.Mesh(new THREE.SphereGeometry(1.5,64,40),cortexMat);
    m3.scale.set(.78,.58,.68);m3.position.set(sx*1.25,-.95,-.45);m3.castShadow=true;g.add(m3);
    // 额极
    const m4=new THREE.Mesh(new THREE.SphereGeometry(1.8,64,40),cortexMat);
    m4.scale.set(.72,.88,.78);m4.position.set(sx*.75,1.25,.95);m4.castShadow=true;g.add(m4);
    return g;
  }
  brainGroup.add(hemi(-1));brainGroup.add(hemi(1));

  // 半球间裂
  const fiss=new THREE.Mesh(new THREE.BoxGeometry(.12,3.6,2.8),
    new THREE.MeshStandardMaterial({color:'#2a1a10',roughness:.9}));
  fiss.position.set(0,.25,-.05);brainGroup.add(fiss);

  // 小脑
  function cerebellum(){
    const g=new THREE.Group();
    const v=new THREE.Mesh(new THREE.CylinderGeometry(.32,.32,1.5,16),cortexMat);
    v.position.set(0,-2.05,-1.7);v.rotation.x=.55;v.castShadow=true;g.add(v);
    for(let s=-1;s<=1;s+=2){
      const h=new THREE.Mesh(new THREE.SphereGeometry(1.05,40,28),cortexMat);
      h.scale.set(1.15,.5,.42);h.position.set(s*.5,-2,-2);h.rotation.z=s*.22;h.castShadow=true;g.add(h);
      for(let i=0;i<5;i++){
        const r=new THREE.Mesh(new THREE.TorusGeometry(.65+i*.1,.022,6,20),
          new THREE.MeshStandardMaterial({color:'#8b6a52',roughness:.55}));
        r.position.set(s*.5,-2,-2+i*.05);r.rotation.x=Math.PI/2;r.rotation.y=s*.3;
        r.scale.set(1,.45,1);g.add(r);
      }
    }
    return g;
  }
  brainGroup.add(cerebellum());

  // 脑干
  function brainstem(){
    const g=new THREE.Group();
    const mid=new THREE.Mesh(new THREE.SphereGeometry(.5,20,14),cortexMat);
    mid.scale.set(.85,.65,.75);mid.position.set(0,-1.4,-.45);mid.castShadow=true;g.add(mid);
    const pons=new THREE.Mesh(new THREE.CylinderGeometry(.45,.5,.75,16),cortexMat);
    pons.position.set(0,-2,-.55);pons.castShadow=true;g.add(pons);
    const med=new THREE.Mesh(new THREE.CylinderGeometry(.28,.44,1.1,16),cortexMat);
    med.position.set(0,-2.75,-.45);med.castShadow=true;g.add(med);
    return g;
  }
  brainGroup.add(brainstem());

  // 胼胝体
  const ccCurve=new THREE.CatmullRomCurve3([
    new THREE.Vector3(0,1.9,.9),new THREE.Vector3(0,2.1,.25),
    new THREE.Vector3(0,1.7,-.5),new THREE.Vector3(0,1.2,-1.1)
  ]);
  brainGroup.add(new THREE.Mesh(
    new THREE.TubeGeometry(ccCurve,24,.22,8,false),
    new THREE.MeshStandardMaterial({color:'#f0e8d8',roughness:.22,metalness:.03})
  ));

  // 标记球体
  brainRegions.forEach(r=>{
    const [rx,ry,rz]=r.position3D;
    const sx=rx/26,sy=(ry+28)/26,sz=(rz-10)/24;
    const mg=new THREE.SphereGeometry(.18,24,24);
    const mm=new THREE.MeshStandardMaterial({color:r.color,roughness:.2,metalness:.3,emissive:r.color,emissiveIntensity:.45});
    const m=new THREE.Mesh(mg,mm);
    m.position.set(sx,sy,sz);m.userData={region:r,baseScale:1};
    m.castShadow=true;brainGroup.add(m);markers.push(m);
    // 光环
    const rg=new THREE.TorusGeometry(.26,.035,8,18);
    const rm=new THREE.MeshStandardMaterial({color:r.color,roughness:.15,metalness:.4,emissive:r.color,emissiveIntensity:.35});
    const ring=new THREE.Mesh(rg,rm);
    ring.position.copy(m.position);ring.userData={region:r,parentMarker:m};
    brainGroup.add(ring);
  });

  // 粒子
  const pg=new THREE.BufferGeometry();const pc=150;
  const pa=new Float32Array(pc*3);
  for(let i=0;i<pc;i++){pa[i*3]=(Math.random()-.5)*18;pa[i*3+1]=(Math.random()-.5)*18;pa[i*3+2]=(Math.random()-.5)*18}
  pg.setAttribute('position',new THREE.BufferAttribute(pa,3));
  scene.add(new THREE.Points(pg,new THREE.PointsMaterial({color:'#665544',size:.025,transparent:true,opacity:.4})));
}

// ===== 交互 =====
function onClick(e){
  const r=renderer.domElement.getBoundingClientRect();
  mouse.x=((e.clientX-r.left)/r.width)*2-1;mouse.y=-((e.clientY-r.top)/r.height)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const is=raycaster.intersectObjects(markers,false);
  if(is.length>0&&is[0].object.userData.region){selectRegion(is[0].object.userData.region.id)}
}
function onMove(e){
  const r=renderer.domElement.getBoundingClientRect();
  mouse.x=((e.clientX-r.left)/r.width)*2-1;mouse.y=-((e.clientY-r.top)/r.height)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const is=raycaster.intersectObjects(markers,false);
  if(is.length>0&&is[0].object.userData.region){
    if(hovered!==is[0].object){
      resetHover();hovered=is[0].object;
      hovered.scale.set(1.55,1.55,1.55);hovered.material.emissiveIntensity=1;
      document.body.style.cursor='pointer';
    }
    return;
  }
  resetHover();document.body.style.cursor='';
}
function resetHover(){
  if(hovered){hovered.scale.set(1,1,1);hovered.material.emissiveIntensity=.45;hovered=null}
}

function selectRegion(id){
  const region=brainRegions.find(r=>r.id===id);if(!region)return;
  selected=region;
  markers.forEach(m=>{m.scale.set(1,1,1);m.material.emissiveIntensity=.45});
  const tm=markers.find(m=>m.userData.region.id===id);
  if(tm){tm.scale.set(1.7,1.7,1.7);tm.material.emissiveIntensity=1.4}
  updatePanel(region);
}

// ===== 信息面板 (精简 + 可展开) =====
function updatePanel(r){
  document.getElementById('pname').textContent=r.name;
  document.getElementById('pen').textContent=r.nameEn;
  const tag=document.getElementById('ptag');tag.style.display='inline-block';
  tag.textContent=r.systemName;tag.style.background=r.color;

  const l=r.layers;let h='';

  function sec(title,summary,detail){
    const id='d'+Math.random().toString(36).slice(2,8);
    return `<div class="cinfo">
      <div class="ci-title">${title}</div>
      <div class="ci-text">${summary}</div>
      ${detail?`<span class="ci-toggle" data-target="${id}">▶ 详情</span><div class="ci-detail" id="${id}">${detail}</div>`:''}
    </div>`;
  }

  if(l.anatomy){
    h+=sec('📍 解剖位置',
      l.anatomy.location,
      `<b>外观：</b>${l.anatomy.appearance||''}<br><b>毗邻：</b>${l.anatomy.relations||''}<br>${l.anatomy.size?'<b>体积：</b>'+l.anatomy.size:''}`);
  }
  if(l.cytoarchitecture?.subnuclei?.length){
    const det=l.cytoarchitecture.subnuclei.map(s=>`<b>${s.name}：</b>${s.desc}`).join('<br>')+
      (l.cytoarchitecture.special?`<br><br>💡 ${l.cytoarchitecture.special}`:'');
    h+=sec('🧬 细胞构筑',l.cytoarchitecture.subnuclei.map(s=>s.name).join(' · '),det);
  }
  if(l.functions){
    h+=sec('⚡ 功能',l.functions.primary,
      (l.functions.computational?`<b>计算：</b>${l.functions.computational}<br>`:'')+
      (l.functions.dissociations?`<b>分离：</b>${l.functions.dissociations}<br>`:'')+
      (l.functions.paradigms?`<b>范式：</b>${l.functions.paradigms.join('、')}`:''));
  }
  if(l.connectivity){
    h+=sec('🔗 连接',
      (l.connectivity.inputs?`输入自 ${l.connectivity.inputs.slice(0,3).join('、')}${l.connectivity.inputs.length>3?'…':''}`:''),
      (l.connectivity.inputs?`<b>传入：</b>${l.connectivity.inputs.join(' · ')}<br>`:'')+
      (l.connectivity.outputs?`<b>传出：</b>${l.connectivity.outputs.join(' · ')}<br>`:'')+
      (l.connectivity.keyCircuits?`<b>环路：</b>${l.connectivity.keyCircuits.map(c=>'<br>→ '+c).join('')}`:''));
  }
  if(l.neurotransmitters?.length){
    h+=sec('⚗️ 递质',l.neurotransmitters.slice(0,3).join(' · '),
      l.neurotransmitters.join(' · '));
  }
  if(l.clinicalRelevance){
    h+=sec('🏥 临床',l.clinicalRelevance.disorders?.slice(0,3).join(' · ')||'',
      (l.clinicalRelevance.disorders?`<b>疾病：</b>${l.clinicalRelevance.disorders.join(' · ')}<br>`:'')+
      (l.clinicalRelevance.symptoms?`<b>症状：</b>${l.clinicalRelevance.symptoms}<br>`:'')+
      (l.clinicalRelevance.treatments?`<b>治疗：</b>${l.clinicalRelevance.treatments.join(' · ')}<br>`:'')+
      (l.clinicalRelevance.keyNote?`<br>⚠️ ${l.clinicalRelevance.keyNote}`:''));
  }
  if(l.research){
    h+=sec('📚 研究',
      l.research.classicPapers?.map(c=>c.author.split('(')[0].trim()).join('; ')||'',
      (l.research.classicPapers?l.research.classicPapers.map(c=>`<b>${c.author}</b> <i>${c.title}</i> — ${c.journal}`).join('<br>'):'')+
      (l.research.recentFindings?`<br><br>🔬 <b>最新：</b>${l.research.recentFindings}`:'')+
      (l.research.debates?`<br><br>💬 <b>争论：</b>${l.research.debates}`:''));
  }

  document.getElementById('pbody').innerHTML=h;
  // 折叠按钮
  document.querySelectorAll('.ci-toggle').forEach(t=>{
    t.addEventListener('click',()=>{
      const d=document.getElementById(t.dataset.target);
      d.classList.toggle('on');
      t.textContent=d.classList.contains('on')?'▼ 收起':'▶ 详情';
    });
  });
}

// ===== 视图切换 =====
window.setView=function(v){
  document.querySelectorAll('.tbtn[data-v]').forEach(b=>b.classList.remove('on'));
  document.querySelector(`.tbtn[data-v="${v}"]`)?.classList.add('on');
  const sl=document.getElementById('slices');
  if(v==='slice'){sl.classList.add('on');drawSlices()}
  else{sl.classList.remove('on');onResize()}
};

// ===== 搜索 =====
const si=document.getElementById('si'),sd=document.getElementById('sdrop');
let sidx=-1;
si.addEventListener('input',()=>{
  const q=si.value.trim().toLowerCase();sd.innerHTML='';sidx=-1;
  if(q.length<1){sd.classList.remove('on');return}
  const ms=brainRegions.filter(r=>r.name.includes(q)||r.nameEn.toLowerCase().includes(q)||r.id.includes(q)||r.systemName.includes(q));
  if(ms.length===0){sd.innerHTML='<div style="padding:10px;text-align:center;color:var(--ink-muted)">无匹配</div>';sd.classList.add('on');return}
  ms.forEach((r,i)=>{
    const d=document.createElement('div');d.className='sr';
    d.innerHTML=`<span class="dot" style="background:${r.color}"></span>${r.name}<span style="margin-left:auto;font-size:.7rem;color:var(--ink-muted)">${r.systemName}</span>`;
    d.addEventListener('click',()=>{selectRegion(r.id);sd.classList.remove('on');si.value=''});
    sd.appendChild(d);
  });
  sd.classList.add('on');
});
si.addEventListener('keydown',e=>{
  const its=sd.querySelectorAll('.sr');
  if(e.key==='ArrowDown'){e.preventDefault();sidx=Math.min(sidx+1,its.length-1);its.forEach((it,i)=>it.style.background=i===sidx?'#f8f4ee':'')}
  else if(e.key==='ArrowUp'){e.preventDefault();sidx=Math.max(sidx-1,0);its.forEach((it,i)=>it.style.background=i===sidx?'#f8f4ee':'')}
  else if(e.key==='Enter'&&sidx>=0&&its[sidx]){e.preventDefault();its[sidx].click()}
  else if(e.key==='Escape'){sd.classList.remove('on');si.blur()}
});
document.addEventListener('click',e=>{if(!e.target.closest('.search'))sd.classList.remove('on')});

// ===== 自测 =====
window.startQuiz=function(){
  const r=brainRegions[Math.floor(Math.random()*brainRegions.length)];
  document.getElementById('pname').textContent='✎ 自测模式';
  document.getElementById('pen').textContent='在 3D 大脑上找到对应脑区并点击';
  document.getElementById('ptag').style.display='none';
  document.getElementById('pbody').innerHTML=
    `<div style="text-align:center;padding:28px 16px">
      <div style="font-size:1.2rem;font-weight:700;margin-bottom:6px">找到：<span style="color:${r.color}">${r.name}</span></div>
      <div style="color:var(--ink-muted);margin-bottom:14px">${r.nameEn}</div>
      <button onclick="selectRegion('${r.id}')" style="padding:9px 22px;background:var(--ink-light);color:#fff;border:none;border-radius:16px;cursor:pointer;font-size:.85rem">显示答案</button>
    </div>`;
};

// ===== 快捷键 =====
document.addEventListener('keydown',e=>{
  if(e.ctrlKey&&e.key==='k'){e.preventDefault();si.focus()}
  if(e.key==='Escape'){selected=null;resetHover();markers.forEach(m=>{m.scale.set(1,1,1);m.material.emissiveIntensity=.45});
    document.getElementById('pname').textContent='大脑解剖学图谱';
    document.getElementById('pen').textContent='交互式 3D 大脑 · 面向心理学研究生';
    document.getElementById('ptag').style.display='none';
    document.getElementById('pbody').innerHTML=`<div class="empty"><div class="eicon">🧠</div><h3>交互式大脑解剖学图谱</h3><p>旋转 3D 大脑，点击彩色标记球体查看脑区信息。</p></div>`;
  }
});

// ===== 动画 =====
function animate(){
  requestAnimationFrame(animate);controls.update();
  const t=Date.now()*.001;
  markers.forEach(m=>{
    if(m!==hovered&&m.userData.region.id!==selected?.id){
      const p=1+Math.sin(t*1.8+m.position.x)*.06;
      m.scale.lerp(new THREE.Vector3(p,p,p),.1);
    }
  });
  renderer.render(scene,camera);
}
function onResize(){
  const c=document.getElementById('tcont');
  camera.aspect=c.clientWidth/c.clientHeight;camera.updateProjectionMatrix();
  renderer.setSize(c.clientWidth,c.clientHeight);
}

init3D();
